proxy-groups:
- name: Global ©️
  type: select
  proxies:
  - Global - UrlTest(Tiers) 🥶
  - Global - Fallback(Tiers) 🌎
  - Global - LoadBalance(ch) 🦄
  - Global - LoadBalance(rr) 🍄
  - Tier 1 🚀
  - Tier 2 ⚡️
  - Tier 3 💎
  - Tier 4 🗿
- name: Global - UrlTest(Tiers) 🥶
  type: url-test
  url: http://clients3.google.com/generate_204
  interval: 300
  proxies:
  - Tier 1 🚀
  - Tier 2 ⚡️
  - Tier 3 💎
  - Tier 4 🗿
- name: Global - Fallback(Tiers) 🌎
  type: fallback
  url: http://clients3.google.com/generate_204
  interval: 300
  proxies:
  - Tier 1 🚀
  - Tier 2 ⚡️
  - Tier 3 💎
  - Tier 4 🗿
- name: Global - LoadBalance(ch) 🦄
  type: load-balance
  strategy: consistent-hashing
  url: http://clients3.google.com/generate_204
  interval: 300
  proxies:
  - Tier 1 🚀
  - Tier 2 ⚡️
  - Tier 3 💎
  - Tier 4 🗿
- name: Global - LoadBalance(rr) 🍄
  type: load-balance
  strategy: round-robin
  url: http://clients3.google.com/generate_204
  interval: 300
  proxies:
  - Tier 1 🚀
